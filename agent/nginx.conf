# nginx reverse proxy for the Pulse RAG agent. SSE-safe: buffering off so the
# token stream reaches the browser live.
server {
    listen 80;
    server_name _;

    # Docker's embedded DNS, with a runtime variable upstream so nginx defers
    # name resolution to request time — it won't crash-loop if the app container
    # isn't resolvable the instant nginx boots.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream pulse-rag:8080;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: do not buffer, keep the connection open.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }
}
